name: Latest Release

# Build installers for every change that lands on main (i.e. every merged PR)
# and publish them to a single, rolling "latest" release. This keeps a set of
# always-current packages (.msi, .exe, .dmg, .AppImage, .deb) available, and
# exposes stable download URLs that never change between builds, e.g.:
#
#   https://github.com/bbolek/omnidoc/releases/download/latest/latest.msi
#   https://github.com/bbolek/omnidoc/releases/latest/download/latest.msi
#
# Tagged `v*` releases continue to be handled by release.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one rolling-latest build at a time. A newer push supersedes an
# in-flight one so the `latest` release always reflects the newest main commit.
concurrency:
  group: latest-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Recreate the `latest` tag/release up front so the matrix jobs below only
  # have to upload assets to it (no race to create it, no stale assets left
  # over from previous runs).
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Recreate the `latest` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove the previous rolling release and its tag (ignore if absent).
          gh release delete latest --cleanup-tag --yes || true
          git push origin :refs/tags/latest || true

          gh release create latest \
            --target "${{ github.sha }}" \
            --title "Latest build" \
            --latest \
            --notes "Rolling build of the latest commit on \`main\` (\`${{ github.sha }}\`).

          These installers are rebuilt automatically on every merge to \`main\`.
          For pinned, versioned downloads use a tagged \`v*\` release instead.

          ## Stable download links
          | Platform | Link |
          |----------|------|
          | Windows (MSI) | https://github.com/${{ github.repository }}/releases/download/latest/latest.msi |
          | Windows (NSIS .exe) | https://github.com/${{ github.repository }}/releases/download/latest/latest-setup.exe |
          | macOS (Intel) | https://github.com/${{ github.repository }}/releases/download/latest/latest-x64.dmg |
          | macOS (Apple Silicon) | https://github.com/${{ github.repository }}/releases/download/latest/latest-aarch64.dmg |
          | Linux (AppImage) | https://github.com/${{ github.repository }}/releases/download/latest/latest.AppImage |
          | Linux (.deb) | https://github.com/${{ github.repository }}/releases/download/latest/latest.deb |
          | Linux (.rpm) | https://github.com/${{ github.repository }}/releases/download/latest/latest.rpm |

          ## All packages
          The original versioned installers are also attached below."

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Rust build artifacts to speed up subsequent runs (~5–10 min saved)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload to the `latest` release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Upload into the `latest` release that the prepare job created.
          tagName: latest
          releaseName: "Latest build"
          releaseDraft: false
          prerelease: false
          target: ${{ matrix.target }}
          args: --target ${{ matrix.target }}

  # After all platforms have uploaded, publish stable `latest.*` aliases for
  # every installer so the download URLs never change even when the version in
  # the filename does. macOS has two builds, so its DMGs are arch-suffixed.
  publish-latest-aliases:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mirror every installer to a stable latest.* name
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Pull down everything the build jobs uploaded (the versioned files
          # are prefixed with the product name; our own latest.* are not).
          gh release download latest --repo "$REPO" --dir dist --pattern "Omnidoc_*"

          cd dist
          shopt -s nullglob

          # mirror <glob> <stable-name>: copy the first match, if any.
          mirror() {
            local dest="$2"; local f
            for f in $1; do
              cp "$f" "$dest"
              echo "  $f -> $dest"
              return 0
            done
            echo "  (no match for '$1', skipping $dest)"
          }

          echo "Building latest.* aliases:"
          mirror 'Omnidoc_*_x64_*.msi'   latest.msi            # Windows installer (MSI)
          mirror 'Omnidoc_*-setup.exe'   latest-setup.exe      # Windows installer (NSIS)
          mirror 'Omnidoc_*_x64.dmg'     latest-x64.dmg        # macOS (Intel)
          mirror 'Omnidoc_*_aarch64.dmg' latest-aarch64.dmg    # macOS (Apple Silicon)
          mirror 'Omnidoc_*.AppImage'    latest.AppImage       # Linux (portable)
          mirror 'Omnidoc_*.deb'         latest.deb            # Linux (Debian/Ubuntu)
          mirror 'Omnidoc_*.rpm'         latest.rpm            # Linux (Fedora/RHEL)

          uploads=(latest.* latest-*)
          if [ ${#uploads[@]} -eq 0 ]; then
            echo "No installers found in the latest release" >&2
            exit 1
          fi
          gh release upload latest "${uploads[@]}" --repo "$REPO" --clobber
