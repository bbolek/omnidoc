name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Rust build artifacts to speed up subsequent runs (~5–10 min saved)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Omnidoc v__VERSION__"
          releaseBody: |
            ## What's new
            See commit history for changes in this release.

            ## Downloads
            Pick the installer for your platform from the assets below.

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` (recommended) or `.exe` (NSIS) |
            | macOS Intel | `.dmg` (x86_64) |
            | macOS Apple Silicon | `.dmg` (aarch64) |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
          releaseDraft: true
          prerelease: false
          target: ${{ matrix.target }}
          args: --target ${{ matrix.target }}
