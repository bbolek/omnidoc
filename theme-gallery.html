<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>md-viewer — Theme Gallery</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e6edf3;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 28px;
    color: #f0f6fc;
    letter-spacing: -0.3px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #30363d;
    background: #161b22;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card img {
    width: 100%;
    display: block;
    cursor: pointer;
  }
  .caption {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #8b949e;
    border-top: 1px solid #21262d;
    letter-spacing: 0.2px;
  }
  /* Lightbox */
  #lb {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lb.open { display: flex; }
  #lb img {
    max-width: 95vw;
    max-height: 95vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
</style>
</head>

  document.querySelectorAll('.card img').forEach(img => {
